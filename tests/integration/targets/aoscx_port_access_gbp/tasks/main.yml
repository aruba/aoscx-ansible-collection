# Integration tests for the aoscx_port_access_gbp module.
#
# Run with:
#   ansible-test integration aoscx_port_access_gbp --venv
#
# Requires an inventory entry named "aoscx" reachable with a REST API version
# of 10.16, and the referenced traffic classes "ansible-test-c1" and
# "ansible-test-c2" (type gbp-ipv4) to already exist on the device. Uses a
# temporary policy named "ansible-test" and cleans up afterwards.

- name: Make sure the test policy does not exist yet
  arubanetworks.aoscx.aoscx_port_access_gbp:
    name: ansible-test
    state: delete
  ignore_errors: true

- name: Create a group based policy with two entries
  arubanetworks.aoscx.aoscx_port_access_gbp:
    name: ansible-test
    entries:
      - sequence_number: 10
        class_name: ansible-test-c1
        class_type: gbp-ipv4
        comment: drop-c1
        drop: true
      - sequence_number: 20
        class_name: ansible-test-c2
        class_type: gbp-ipv4
  register: result

- name: Assert the policy was created
  ansible.builtin.assert:
    that:
      - result.changed

- name: Create the policy again (idempotent)
  arubanetworks.aoscx.aoscx_port_access_gbp:
    name: ansible-test
    state: update
    entries:
      - sequence_number: 10
        class_name: ansible-test-c1
        class_type: gbp-ipv4
        comment: drop-c1
        drop: true
      - sequence_number: 20
        class_name: ansible-test-c2
        class_type: gbp-ipv4
  register: result

- name: Assert no change on re-apply
  ansible.builtin.assert:
    that:
      - not result.changed

- name: Update the policy (remove entry 20, reflect on 10)
  arubanetworks.aoscx.aoscx_port_access_gbp:
    name: ansible-test
    state: update
    entries:
      - sequence_number: 10
        class_name: ansible-test-c1
        class_type: gbp-ipv4
        comment: drop-c1
        drop: true
        reflect: true
  register: result

- name: Assert the update was applied
  ansible.builtin.assert:
    that:
      - result.changed

- name: Delete the group based policy
  arubanetworks.aoscx.aoscx_port_access_gbp:
    name: ansible-test
    state: delete
  register: result

- name: Assert the policy was deleted
  ansible.builtin.assert:
    that:
      - result.changed
