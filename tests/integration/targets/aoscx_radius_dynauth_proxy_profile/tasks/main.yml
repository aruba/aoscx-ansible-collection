# Integration tests for aoscx_radius_dynauth_proxy_profile.
- name: Set up prerequisites
  arubanetworks.aoscx.aoscx_radius_dynamic_authorization_client:
    vrf: default
    address: 192.0.2.41
    connection_type: udp
    state: create
- arubanetworks.aoscx.aoscx_radius_dynauth_proxy_server:
    vrf: default
    address: 192.0.2.30
    port: 3799
    port_type: udp
    state: create
- arubanetworks.aoscx.aoscx_radius_dynauth_proxy_client_group:
    group_name: integration-cg
    clients:
      - address: 192.0.2.41
    state: create
- name: Create profile tying client group and server
  arubanetworks.aoscx.aoscx_radius_dynauth_proxy_profile:
    profile_name: integration-proxy
    enabled: true
    vrf: default
    client_group: integration-cg
    server:
      address: 192.0.2.30
      port: 3799
      port_type: udp
    state: create
  register: create_result
- ansible.builtin.assert:
    that:
      - create_result is changed
- name: Re-apply identical
  arubanetworks.aoscx.aoscx_radius_dynauth_proxy_profile:
    profile_name: integration-proxy
    enabled: true
    vrf: default
    client_group: integration-cg
    server:
      address: 192.0.2.30
      port: 3799
      port_type: udp
    state: create
  register: idem_result
- ansible.builtin.assert:
    that:
      - idem_result is not changed
- name: Tear down
  block:
    - arubanetworks.aoscx.aoscx_radius_dynauth_proxy_profile:
        profile_name: integration-proxy
        state: delete
    - arubanetworks.aoscx.aoscx_radius_dynauth_proxy_client_group:
        group_name: integration-cg
        state: delete
    - arubanetworks.aoscx.aoscx_radius_dynauth_proxy_server:
        vrf: default
        address: 192.0.2.30
        port: 3799
        port_type: udp
        state: delete
    - arubanetworks.aoscx.aoscx_radius_dynamic_authorization_client:
        vrf: default
        address: 192.0.2.41
        connection_type: udp
        state: delete
