---
# Integration tests for the aoscx_prefix_list module.
#
# Run with:
#   ansible-test integration aoscx_prefix_list --venv
#
# Requires an inventory entry named "aoscx" reachable over httpapi with a
# pyaoscx release that ships the PrefixList / PrefixListEntry classes.

- name: Make sure the test prefix list does not exist yet
  arubanetworks.aoscx.aoscx_prefix_list:
    name: QA_PREFIX_LIST
    state: delete
  ignore_errors: true

- name: Create an IPv4 prefix list with two entries
  arubanetworks.aoscx.aoscx_prefix_list:
    name: QA_PREFIX_LIST
    address_family: ipv4
    description: created by integration test
    entries:
      - preference: 10
        action: permit
        prefix: 10.0.0.0/8
        le: 24
      - preference: 20
        action: deny
        prefix: 192.168.0.0/16
    state: create
  register: create_result

- name: Assert the prefix list was created
  ansible.builtin.assert:
    that:
      - create_result is changed

- name: Re-apply the exact same configuration (idempotency)
  arubanetworks.aoscx.aoscx_prefix_list:
    name: QA_PREFIX_LIST
    address_family: ipv4
    description: created by integration test
    entries:
      - preference: 10
        action: permit
        prefix: 10.0.0.0/8
        le: 24
      - preference: 20
        action: deny
        prefix: 192.168.0.0/16
    state: create
  register: idempotent_result

- name: Assert the second run reports no change
  ansible.builtin.assert:
    that:
      - idempotent_result is not changed

- name: Update the description and one entry
  arubanetworks.aoscx.aoscx_prefix_list:
    name: QA_PREFIX_LIST
    description: updated by integration test
    entries:
      - preference: 10
        action: permit
        prefix: 10.0.0.0/8
        le: 16
      - preference: 20
        action: deny
        prefix: 192.168.0.0/16
    state: update
  register: update_result

- name: Assert the update reports a change
  ansible.builtin.assert:
    that:
      - update_result is changed

- name: Attempt to change the immutable address family (expected failure)
  arubanetworks.aoscx.aoscx_prefix_list:
    name: QA_PREFIX_LIST
    address_family: ipv6
    state: update
  register: af_result
  ignore_errors: true

- name: Assert the address family change was refused
  ansible.builtin.assert:
    that:
      - af_result is failed
      - "'address_family cannot be changed' in af_result.msg"

- name: Attempt an out-of-range ge value (expected failure)
  arubanetworks.aoscx.aoscx_prefix_list:
    name: QA_PREFIX_LIST
    state: update
    entries:
      - preference: 10
        action: permit
        prefix: 10.0.0.0/8
        ge: 200
  register: ge_result
  ignore_errors: true

- name: Assert the out-of-range ge value was refused
  ansible.builtin.assert:
    that:
      - ge_result is failed
      - "'between 0 and 128' in ge_result.msg"

- name: Delete the prefix list
  arubanetworks.aoscx.aoscx_prefix_list:
    name: QA_PREFIX_LIST
    state: delete
  register: delete_result

- name: Assert the prefix list was deleted
  ansible.builtin.assert:
    that:
      - delete_result is changed

- name: Delete again to confirm idempotent removal
  arubanetworks.aoscx.aoscx_prefix_list:
    name: QA_PREFIX_LIST
    state: delete
  register: delete_again_result

- name: Assert the second delete reports no change
  ansible.builtin.assert:
    that:
      - delete_again_result is not changed
